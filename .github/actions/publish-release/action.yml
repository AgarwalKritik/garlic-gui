name: 'Publish Release'
description: 'Publishes a GitHub Release with provided artifacts'
inputs:
  files:
    description: 'Files to upload to the release'
    required: true
  draft:
    description: 'Is it a draft release?'
    required: false
    default: 'false'
  prerelease:
    description: 'Is it a pre-release?'
    required: false
    default: 'false'
  tag_name:
    description: 'Tag name for the release'
    required: false
runs:
  using: 'composite'
  steps:
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        files: ${{ inputs.files }}
        draft: ${{ inputs.draft }}
        prerelease: ${{ inputs.prerelease }}
        tag_name: ${{ inputs.tag_name }}
