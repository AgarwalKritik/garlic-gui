name: Release Build

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  APP_VERSION: ${{ github.ref_name }}
  QT_VERSION: "6.10.3"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      windows-artifacts: ${{ steps.export.outputs.artifacts }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Qt (Windows)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: "desktop"
          arch: "win64_mingw"
          tools: "tools_mingw1310"

      - name: Configure CMake (Windows)
        shell: pwsh
        run: |
            Write-Host "QT_ROOT_DIR: $env:QT_ROOT_DIR"

            $gcc = Get-Command gcc.exe -ErrorAction Stop
            $gpp = Get-Command g++.exe -ErrorAction Stop
            $make = Get-Command mingw32-make.exe -ErrorAction Stop

            Write-Host "gcc:  $($gcc.Source)"
            Write-Host "g++:  $($gpp.Source)"
            Write-Host "make: $($make.Source)"

            $env:CC = $gcc.Source
            $env:CXX = $gpp.Source

            if (Test-Path build) { Remove-Item -Recurse -Force build }

            cmake -B build -S . -G "MinGW Makefiles" `
              -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
              -DCMAKE_BUILD_TYPE=Release `
              -DCMAKE_CXX_STANDARD=17 `
              -DCMAKE_EXE_LINKER_FLAGS="-Wl,--allow-multiple-definition" `
              -DCMAKE_C_COMPILER="$env:CC" `
              -DCMAKE_CXX_COMPILER="$env:CXX" `
              -DCMAKE_MAKE_PROGRAM="$($make.Source)"

      - name: Build
        run: cmake --build build --clean-first -j4

      - name: Package Windows ZIP
        shell: pwsh
        run: |
          cmake --install build --prefix install_dir
          Compress-Archive -Path install_dir/bin/* -DestinationPath Garlic-GUI-${{ env.APP_VERSION }}-Windows-x64.zip

      - name: Generate Inno Setup Script
        shell: bash
        run: |
          mkdir -p windows
          cat > windows/installer.iss << EOL
          [Setup]
          AppName=GarlicGUI
          AppVersion=${APP_VERSION#v}
          WizardStyle=modern
          DefaultDirName={autopf}\GarlicGUI
          DefaultGroupName=GarlicGUI
          UninstallDisplayIcon={app}\GarlicGUI.exe
          Compression=lzma2
          SolidCompression=yes
          OutputBaseFilename=Garlic-GUI-Windows-installer-${APP_VERSION}
          OutputDir=Output

          [Files]
          Source: "..\install_dir\bin\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs

          [Icons]
          Name: "{group}\GarlicGUI"; Filename: "{app}\GarlicGUI.exe"
          Name: "{commondesktop}\GarlicGUI"; Filename: "{app}\GarlicGUI.exe"
          
          [Registry]
          Root: HKLM; Subkey: "SYSTEM\CurrentControlSet\Control\Session Manager\Environment"; ValueType: expandsz; ValueName: "Path"; ValueData: "{olddata};{app}"; Check: NeedsAddPath(ExpandConstant('{app}'))

          [Code]
          function NeedsAddPath(Param: string): boolean;
          var
            OrigPath: string;
          begin
            if not RegQueryStringValue(HKEY_LOCAL_MACHINE,
              'SYSTEM\CurrentControlSet\Control\Session Manager\Environment',
              'Path', OrigPath)
            then begin
              Result := True;
              exit;
            end;
            Result := Pos(';' + Param + ';', ';' + OrigPath + ';') = 0;
          end;
          EOL

      - name: Set up Inno Setup
        run: |
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile "inno-setup.exe"
          .\inno-setup.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-
          $isccPath = Get-ChildItem -Path "C:\Program Files*\Inno Setup*" -Recurse -Filter "iscc.exe" -ErrorAction SilentlyContinue
          if ($isccPath) {
              $isccDir = Split-Path -Path $isccPath.FullName -Parent
              $env:Path += ";$isccDir"
              Write-Output "Inno Setup is installed at: $isccDir"
          } else {
              Write-Output "Inno Setup is not installed."
          }
        shell: pwsh

      - name: Create Windows Installer
        run: |
          iscc windows/installer.iss
          Move-Item windows/Output/Garlic-GUI-Windows-installer-${{ env.APP_VERSION }}.exe Garlic-GUI-${{ env.APP_VERSION }}-Windows-x64-installer.exe

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: |
            Garlic-GUI-${{ env.APP_VERSION }}-Windows-x64.zip
            Garlic-GUI-${{ env.APP_VERSION }}-Windows-x64-installer.exe

  build-linux:
    runs-on: ubuntu-24.04
    outputs:
      linux-artifacts: ${{ steps.export.outputs.artifacts }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: "desktop"

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev dpkg-dev rpm ruby ruby-dev pkg-config
          sudo gem install --no-document fpm
          wget -O appimagetool-x86_64.AppImage "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --clean-first -j4

      - name: Package tar.gz
        run: |
          mkdir -p tarball
          cp -r build/* tarball/
          tar -czvf Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.tar.gz -C tarball .

      - name: Package DEB and RPM via FPM
        run: |
          mkdir -p dist/linux/opt/garlicgui
          mkdir -p dist/linux/usr/share/applications
          mkdir -p dist/linux/usr/local/bin
          cp -r build/* dist/linux/opt/garlicgui/
          ln -s /opt/garlicgui/GarlicGUI dist/linux/usr/local/bin/garlicgui
          cat > dist/linux/usr/share/applications/garlicgui.desktop <<EOF
          [Desktop Entry]
          Name=Garlic-GUI
          Exec=GarlicGUI
          Icon=garlicgui
          Terminal=false
          Type=Application
          Categories=Development;
          EOF
          fpm -s dir -t deb -n garlicgui -v ${APP_VERSION#v} -C dist/linux .
          fpm -s dir -t rpm -n garlicgui -v ${APP_VERSION#v} -C dist/linux .
          cp dist/linux/garlicgui_*.deb Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.deb
          cp dist/linux/garlicgui-*.x86_64.rpm Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.rpm

      - name: Package AppImage
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/GarlicGUI AppDir/usr/bin/
          cp icon/garlic.png AppDir/usr/share/icons/hicolor/256x256/apps/garlicgui.png
          cat > AppDir/usr/share/applications/garlicgui.desktop <<EOF
          [Desktop Entry]
          Name=Garlic-GUI
          Exec=GarlicGUI
          Icon=garlicgui
          Terminal=false
          Type=Application
          Categories=Development;
          EOF
          export VERSION=${APP_VERSION#v}
          ./appimagetool-x86_64.AppImage AppDir Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.AppImage

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          path: |
            Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.deb
            Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.rpm
            Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.tar.gz
            Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.AppImage

  build-macos-intel:
    runs-on: macos-15
    outputs:
      macos-artifacts: ${{ steps.export.outputs.artifacts }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: "desktop"

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Fix AGL framework bug on macOS
        run: find build -name "link.txt" -exec sed -i '' 's/-framework AGL//g' {} +

      - name: Build
        run: cmake --build build --clean-first -j4

      - name: Deploy and Package
        run: |
          macdeployqt build/GarlicGUI.app -dmg
          mv build/GarlicGUI.dmg Garlic-GUI-${{ env.APP_VERSION }}-MacOS-intel-x64.dmg
          cd build
          zip -r ../Garlic-GUI-${{ env.APP_VERSION }}-MacOS-intel-x64.app.zip GarlicGUI.app

      - name: Upload MacOS Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts
          path: |
            Garlic-GUI-${{ env.APP_VERSION }}-MacOS-intel-x64.dmg
            Garlic-GUI-${{ env.APP_VERSION }}-MacOS-intel-x64.app.zip

  build-macos:
    runs-on: macos-15
    outputs:
      macos-artifacts: ${{ steps.export.outputs.artifacts }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: "desktop"

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Fix AGL framework bug on macOS
        run: find build -name "link.txt" -exec sed -i '' 's/-framework AGL//g' {} +

      - name: Build
        run: cmake --build build --clean-first -j4

      - name: Deploy and Package
        run: |
          macdeployqt build/GarlicGUI.app -dmg
          mv build/GarlicGUI.dmg Garlic-GUI-${{ env.APP_VERSION }}-MacOS-arm64.dmg
          cd build
          zip -r ../Garlic-GUI-${{ env.APP_VERSION }}-MacOS-arm64.app.zip GarlicGUI.app

      - name: Upload MacOS Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts
          path: |
            Garlic-GUI-${{ env.APP_VERSION }}-MacOS-arm64.dmg
            Garlic-GUI-${{ env.APP_VERSION }}-MacOS-arm64.app.zip

  release:
    needs: [build-windows, build-linux, build-macos-intel, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v8
        with:
          name: windows-artifacts
          path: artifacts/

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v8
        with:
          name: linux-artifacts
          path: artifacts/

      - name: Download MacOS Artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-artifacts
          path: artifacts/

      - name: List downloaded artifacts
        run: ls -l artifacts/

      - name: Release
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          tag_name: ${{ env.APP_VERSION }}
          name: Release ${{ env.APP_VERSION }}
          draft: false
          prerelease: false
          files: |
            artifacts/Garlic-GUI-${{ env.APP_VERSION }}-Windows-x64.zip
            artifacts/Garlic-GUI-${{ env.APP_VERSION }}-Windows-x64-installer.exe
            artifacts/Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.deb
            artifacts/Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.rpm
            artifacts/Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.tar.gz
            artifacts/Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.AppImage
            artifacts/Garlic-GUI-${{ env.APP_VERSION }}-MacOS-intel-x64.dmg
            artifacts/Garlic-GUI-${{ env.APP_VERSION }}-MacOS-intel-x64.app.zip
            artifacts/Garlic-GUI-${{ env.APP_VERSION }}-MacOS-arm64.dmg
            artifacts/Garlic-GUI-${{ env.APP_VERSION }}-MacOS-arm64.app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
