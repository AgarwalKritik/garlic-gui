name: 'Package Linux'
description: 'Packages the Linux build into AppImage, DEB, RPM, and tar.gz'
inputs:
  app_version:
    description: 'Application version (e.g. v1.0.0)'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Install packaging dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libgl1-mesa-dev dpkg-dev rpm ruby ruby-dev
        sudo gem install --no-document fpm
        wget -O appimagetool-x86_64.AppImage "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
        chmod +x appimagetool-x86_64.AppImage
        wget -O linuxdeployqt-x86_64.AppImage "https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage"
        chmod +x linuxdeployqt-x86_64.AppImage
        sudo mv linuxdeployqt-x86_64.AppImage /usr/local/bin/linuxdeployqt
        sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool

    - name: Prepare AppDir with linuxdeployqt
      shell: bash
      run: |
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/share/applications
        mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
        cp build/GarlicGUI AppDir/usr/bin/
        cp icon/garlic.png AppDir/usr/share/icons/hicolor/256x256/apps/garlicgui.png
        cat > AppDir/usr/share/applications/garlicgui.desktop <<EOF
        [Desktop Entry]
        Name=Garlic-GUI
        Exec=Garlic-GUI
        Icon=garlicgui
        Terminal=false
        Type=Application
        Categories=Development;
        EOF
        VERSION="${{ inputs.app_version }}"
        export VERSION="${VERSION#v}"
        linuxdeployqt AppDir/usr/share/applications/garlicgui.desktop -appimage -executable=AppDir/usr/bin/GarlicGUI -unsupported-allow-new-glibc
        mv GarlicGUI-*.AppImage Garlic-GUI-${{ inputs.app_version }}-Linux-x64.AppImage

    - name: Package tar.gz
      shell: bash
      run: |
        tar -czvf Garlic-GUI-${{ inputs.app_version }}-Linux-x64.tar.gz AppDir

    - name: Package DEB and RPM via FPM
      shell: bash
      run: |
        mkdir -p dist/linux/opt/garlicgui
        mkdir -p dist/linux/usr/share/applications
        mkdir -p dist/linux/usr/local/bin
        cp -r AppDir/* dist/linux/opt/garlicgui/
        ln -s /opt/garlicgui/usr/bin/GarlicGUI dist/linux/usr/local/bin/garlicgui
        cp AppDir/usr/share/applications/garlicgui.desktop dist/linux/usr/share/applications/
        
        VERSION="${{ inputs.app_version }}"
        VERSION="${VERSION#v}"
        
        fpm -s dir -t deb -n garlicgui -v $VERSION -C dist/linux .
        fpm -s dir -t rpm -n garlicgui -v $VERSION -C dist/linux .
        
        mv garlicgui_*.deb Garlic-GUI-${{ inputs.app_version }}-Linux-x64.deb
        mv garlicgui-*.rpm Garlic-GUI-${{ inputs.app_version }}-Linux-x64.rpm
