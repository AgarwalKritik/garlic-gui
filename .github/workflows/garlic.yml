name: Release Build

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  APP_VERSION: ${{ github.ref_name }}
  QT_VERSION: "6.10.3"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      windows-artifacts: ${{ steps.export.outputs.artifacts }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Qt (Windows)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: "desktop"
          # TODO: switch to "win64_mingw_static" once Qt CI provides static builds
          arch: "win64_mingw"
          tools: "tools_mingw1310"

      - name: Configure CMake (Windows)
        shell: pwsh
        run: |
            Write-Host "QT_ROOT_DIR: $env:QT_ROOT_DIR"

            $gcc = Get-Command gcc.exe -ErrorAction Stop
            $gpp = Get-Command g++.exe -ErrorAction Stop
            $make = Get-Command mingw32-make.exe -ErrorAction Stop

            Write-Host "gcc:  $($gcc.Source)"
            Write-Host "g++:  $($gpp.Source)"
            Write-Host "make: $($make.Source)"

            $env:CC = $gcc.Source
            $env:CXX = $gpp.Source

            if (Test-Path build) { Remove-Item -Recurse -Force build }

            cmake -B build -S . -G "MinGW Makefiles" `
              -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
              -DGARLIC_STATIC_QT=OFF `
              -DCMAKE_BUILD_TYPE=Release `
              -DCMAKE_CXX_STANDARD=17 `
              -DCMAKE_EXE_LINKER_FLAGS="-Wl,--allow-multiple-definition" `
              -DCMAKE_C_COMPILER="$env:CC" `
              -DCMAKE_CXX_COMPILER="$env:CXX" `
              -DCMAKE_MAKE_PROGRAM="$($make.Source)"

      - name: Build
        run: cmake --build build --clean-first -j4

      - name: Package Windows ZIP
        shell: pwsh
        run: |
          cmake --install build --prefix install_dir
          Compress-Archive -Path install_dir/bin/* -DestinationPath Garlic-GUI-${{ env.APP_VERSION }}-Windows-x64.zip

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: |
            Garlic-GUI-${{ env.APP_VERSION }}-Windows-x64.zip

  # ============================================================================
  # Standalone (Static Qt6) Windows Build
  #
  # Uses vcpkg to install Qt 6 statically (MSVC), producing a single .exe
  # with zero DLL dependencies. vcpkg handles building Qt from source with
  # static linkage, with GitHub Actions cache for subsequent runs.
  # ============================================================================
  build-windows-standalone:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-x64-windows-static-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            vcpkg-x64-windows-static-

      - name: Install Qt (static via vcpkg)
        shell: pwsh
        run: |
          vcpkg install qtbase:x64-windows-static qtsvg:x64-windows-static --no-print-usage

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -S . -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DGARLIC_STATIC_QT=ON `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j4

      - name: Upload Standalone Executable
        uses: actions/upload-artifact@v7
        with:
          name: windows-standalone-artifacts
          path: build/Release/GarlicGUI.exe

  build-linux:
    runs-on: ubuntu-24.04
    outputs:
      linux-artifacts: ${{ steps.export.outputs.artifacts }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: "desktop"

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev dpkg-dev rpm ruby ruby-dev pkg-config libfuse2
          sudo gem install --no-document fpm
          wget -O appimagetool-x86_64.AppImage "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage

      - name: Configure CMake
        # TODO: switch to -DGARLIC_STATIC_QT=ON + static Qt install
        run: cmake -B build -S . -DGARLIC_STATIC_QT=OFF -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --clean-first -j4

      - name: Package tar.gz
        run: |
          cmake --install build --prefix install_dir
          tar -czvf Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.tar.gz -C install_dir .

      - name: Package DEB and RPM via FPM
        run: |
          cmake --install build --prefix dist/linux/opt/garlicgui
          mkdir -p dist/linux/usr/share/applications
          mkdir -p dist/linux/usr/local/bin
          ln -s /opt/garlicgui/bin/GarlicGUI dist/linux/usr/local/bin/garlicgui
          cat > dist/linux/usr/share/applications/garlicgui.desktop <<EOF
          [Desktop Entry]
          Name=Garlic-GUI
          Exec=GarlicGUI
          Icon=garlicgui
          Terminal=false
          Type=Application
          Categories=Development;
          EOF
          fpm -s dir -t deb -n garlicgui -v ${APP_VERSION#v} -p "Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.deb" -C dist/linux .
          fpm -s dir -t rpm -n garlicgui -v ${APP_VERSION#v} -p "Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.rpm" -C dist/linux .

      - name: Package AppImage
        run: |
          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # Install application binary
          install -Dm755 build/GarlicGUI AppDir/usr/bin/GarlicGUI

          # Install icon into icon theme
          install -Dm644 icon/garlic.png AppDir/usr/share/icons/hicolor/256x256/apps/garlicgui.png

          # REQUIRED: Root icon for appimagetool
          install -Dm644 icon/garlic.png  AppDir/garlicgui.png

          # AppRun launcher
          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/GarlicGUI" "$@"
          EOF
          chmod +x AppDir/AppRun

          # REQUIRED: Desktop file at AppDir root
          cat > AppDir/garlicgui.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=Garlic GUI
          Exec=GarlicGUI
          Icon=garlicgui
          Terminal=false
          Categories=Development;
          EOF

          # Optional desktop file location
          cp AppDir/garlicgui.desktop AppDir/usr/share/applications/garlicgui.desktop

          # Diagnostics
          echo "===== AppDir ====="
          find AppDir -type f

          echo
          echo "===== Root ====="
          ls -lah AppDir

          echo
          echo "===== Binary ====="
          ls -lah AppDir/usr/bin

          echo
          echo "===== Icons ====="
          ls -lah AppDir/usr/share/icons/hicolor/256x256/apps

          test -f AppDir/AppRun
          test -f AppDir/garlicgui.desktop
          test -f AppDir/garlicgui.png
          test -x AppDir/usr/bin/GarlicGUI

          export VERSION=${APP_VERSION#v}

          ./appimagetool-x86_64.AppImage --verbose AppDir Garlic-GUI-${APP_VERSION}-Linux-x64.AppImage

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          path: |
            Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.deb
            Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.rpm
            Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.tar.gz
            Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.AppImage

  build-macos-intel:
    runs-on: macos-26-intel
    outputs:
      macos-artifacts: ${{ steps.export.outputs.artifacts }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: "desktop"

      - name: Configure CMake
        # TODO: switch to -DGARLIC_STATIC_QT=ON + static Qt install
        run: cmake -B build -S . -DGARLIC_STATIC_QT=OFF -DCMAKE_BUILD_TYPE=Release

      - name: Fix AGL framework bug on macOS
        run: find build -name "link.txt" -exec sed -i '' 's/-framework AGL//g' {} +

      - name: Build
        run: cmake --build build --clean-first -j4

      - name: Deploy and Package
        run: |
          macdeployqt build/GarlicGUI.app -dmg
          mv build/GarlicGUI.dmg Garlic-GUI-${{ env.APP_VERSION }}-MacOS-intel-x64.dmg
          cd build
          zip -r ../Garlic-GUI-${{ env.APP_VERSION }}-MacOS-intel-x64.app.zip GarlicGUI.app

      - name: Upload MacOS Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-intel-artifacts
          path: |
            Garlic-GUI-${{ env.APP_VERSION }}-MacOS-intel-x64.dmg
            Garlic-GUI-${{ env.APP_VERSION }}-MacOS-intel-x64.app.zip

  build-macos:
    runs-on: macos-26
    outputs:
      macos-artifacts: ${{ steps.export.outputs.artifacts }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: "desktop"

      - name: Configure CMake
        # TODO: switch to -DGARLIC_STATIC_QT=ON + static Qt install
        run: cmake -B build -S . -DGARLIC_STATIC_QT=OFF -DCMAKE_BUILD_TYPE=Release

      - name: Fix AGL framework bug on macOS
        run: find build -name "link.txt" -exec sed -i '' 's/-framework AGL//g' {} +

      - name: Build
        run: cmake --build build --clean-first -j4

      - name: Deploy and Package
        run: |
          macdeployqt build/GarlicGUI.app -dmg
          mv build/GarlicGUI.dmg Garlic-GUI-${{ env.APP_VERSION }}-MacOS-arm64.dmg
          cd build
          zip -r ../Garlic-GUI-${{ env.APP_VERSION }}-MacOS-arm64.app.zip GarlicGUI.app

      - name: Upload MacOS Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts
          path: |
            Garlic-GUI-${{ env.APP_VERSION }}-MacOS-arm64.dmg
            Garlic-GUI-${{ env.APP_VERSION }}-MacOS-arm64.app.zip

  release:
    needs: [build-windows, build-linux, build-macos, build-macos-intel, build-windows-standalone]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v8
        with:
          name: windows-artifacts
          path: artifacts/

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v8
        with:
          name: linux-artifacts
          path: artifacts/

      - name: Download MacOS Artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-artifacts
          path: artifacts/

      - name: Download MacOS (Intel) Artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-intel-artifacts
          path: artifacts/

      - name: Download Windows Standalone Artifacts
        uses: actions/download-artifact@v8
        with:
          name: windows-standalone-artifacts
          path: artifacts/

      - name: List downloaded artifacts
        run: ls -l artifacts/

      - name: Release
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          tag_name: ${{ env.APP_VERSION }}
          name: Release ${{ env.APP_VERSION }}
          draft: false
          prerelease: false
          files: |
            artifacts/Garlic-GUI-${{ env.APP_VERSION }}-Windows-x64.zip
            artifacts/Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.deb
            artifacts/Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.rpm
            artifacts/Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.tar.gz
            artifacts/Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.AppImage
            artifacts/Garlic-GUI-${{ env.APP_VERSION }}-MacOS-arm64.dmg
            artifacts/Garlic-GUI-${{ env.APP_VERSION }}-MacOS-arm64.app.zip
            artifacts/Garlic-GUI-${{ env.APP_VERSION }}-MacOS-intel-x64.dmg
            artifacts/Garlic-GUI-${{ env.APP_VERSION }}-MacOS-intel-x64.app.zip
            artifacts/GarlicGUI.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
