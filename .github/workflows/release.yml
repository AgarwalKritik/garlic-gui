name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0, v1.0.1)
  workflow_dispatch: # Allow manual triggering

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: GarlicGUI-Linux
          - os: windows-latest
            artifact_name: GarlicGUI-Windows
          - os: macos-26
            artifact_name: GarlicGUI-MacOS

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install Qt (Linux/macOS)
        if: matrix.os != 'windows-latest'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          target: 'desktop'

      - name: Install Qt (Windows)
        if: matrix.os == 'windows-latest'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          target: 'desktop'
          arch: 'win64_mingw'
          tools: 'tools_mingw'

      - name: Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev

      - name: Configure CMake (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $qt_mingw = "$env:IQTA_TOOLS\mingw1120_64\bin"
          Write-Host "Using Qt MinGW from: $qt_mingw"
          $env:PATH = "$qt_mingw;" + $env:PATH
          $env:CC = Join-Path $qt_mingw 'gcc.exe'
          $env:CXX = Join-Path $qt_mingw 'g++.exe'
          
          # Verify the compilers exist
          if (!(Test-Path $env:CC)) { throw "gcc.exe not found at $($env:CC)" }
          if (!(Test-Path $env:CXX)) { throw "g++.exe not found at $($env:CXX)" }
          
          Write-Host "CC: $env:CC"
          Write-Host "CXX: $env:CXX"

          if (Test-Path build) { Remove-Item -Recurse -Force build }

          cmake -B build -S . -G "MinGW Makefiles" `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_CXX_STANDARD=17 `
            -DCMAKE_EXE_LINKER_FLAGS="-Wl,--allow-multiple-definition" `
            -DCMAKE_C_COMPILER="$env:CC" `
            -DCMAKE_CXX_COMPILER="$env:CXX"

      - name: Fix AGL framework bug on macOS
        if: matrix.os == 'macos-26'
        run: find build -name "link.txt" -exec sed -i '' 's/-framework AGL//g' {} +

      - name: Build
        run: cmake --build build --clean-first -j4

      - name: Deploy and Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd build
          cpack -C Release
          Move-Item GarlicGUI-*-win64.zip ..\GarlicGUI-Windows.zip
          Move-Item GarlicGUI-*-win64.msi ..\GarlicGUI-Windows.msi

      - name: Deploy and Package (macOS)
        if: matrix.os == 'macos-26'
        run: |
          macdeployqt build/GarlicGUI.app -dmg
          mv build/GarlicGUI.dmg GarlicGUI-MacOS.dmg

      - name: Deploy and Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Package the standalone binary
          cd build
          tar -czvf ../GarlicGUI-Linux.tar.gz GarlicGUI
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            GarlicGUI-Windows.zip
            GarlicGUI-Windows.msi
            GarlicGUI-MacOS.dmg
            GarlicGUI-Linux.tar.gz
          if-no-files-found: ignore

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/GarlicGUI-Windows/GarlicGUI-Windows.zip
            artifacts/GarlicGUI-Windows/GarlicGUI-Windows.msi
            artifacts/GarlicGUI-MacOS/GarlicGUI-MacOS.dmg
            artifacts/GarlicGUI-Linux/GarlicGUI-Linux.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
