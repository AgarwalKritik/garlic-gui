name: Build and Release
on:
  push:
    tags:
      - 'v*'

env:
  APP_VERSION: ${{ github.ref_name }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Qt
        uses: ./.github/actions/setup-qt
        with:
          version: '6.12.0'
          target: 'desktop'
          arch: 'win64_mingw'
          tools: 'tools_mingw1310'
          qt_email: ${{ secrets.QT_EMAIL }}
          qt_password: ${{ secrets.QT_PASSWORD }}

      - name: Configure CMake
        uses: ./.github/actions/configure-cmake
        with:
          generator: 'MinGW Makefiles'
          extra_args: >
            -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}"
            -DCMAKE_EXE_LINKER_FLAGS="-Wl,--allow-multiple-definition"

      - name: Build CMake
        uses: ./.github/actions/cmake-build

      - name: Package Windows
        uses: ./.github/actions/package-windows
        with:
          app_version: ${{ env.APP_VERSION }}

      - name: Upload Artifacts
        uses: ./.github/actions/upload-artifacts
        with:
          name: windows-artifacts
          path: |
            Garlic-GUI-${{ env.APP_VERSION }}-Windows-x64.zip
            Garlic-GUI-${{ env.APP_VERSION }}-Windows-x64-installer.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Qt
        uses: ./.github/actions/setup-qt
        with:
          version: '6.12.0'
          target: 'desktop'

      - name: Configure CMake
        uses: ./.github/actions/configure-cmake

      - name: Build CMake
        uses: ./.github/actions/cmake-build

      - name: Package Linux
        uses: ./.github/actions/package-linux
        with:
          app_version: ${{ env.APP_VERSION }}

      - name: Upload Artifacts
        uses: ./.github/actions/upload-artifacts
        with:
          name: linux-artifacts
          path: |
            Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.deb
            Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.rpm
            Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.tar.gz
            Garlic-GUI-${{ env.APP_VERSION }}-Linux-x64.AppImage

  build-macos:
    strategy:
      matrix:
        include:
          - os: macos-26-intel
            arch: intel-x64
          - os: macos-26
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Qt
        uses: ./.github/actions/setup-qt
        with:
          version: '6.12.0'
          target: 'desktop'

      - name: Configure CMake
        uses: ./.github/actions/configure-cmake

      - name: Build CMake
        uses: ./.github/actions/cmake-build

      - name: Package MacOS
        uses: ./.github/actions/package-macos
        with:
          app_version: ${{ env.APP_VERSION }}
          arch: ${{ matrix.arch }}

      - name: Upload Artifacts
        uses: ./.github/actions/upload-artifacts
        with:
          name: macos-${{ matrix.arch }}-artifacts
          path: |
            Garlic-GUI-${{ env.APP_VERSION }}-MacOS-${{ matrix.arch }}.dmg
            Garlic-GUI-${{ env.APP_VERSION }}-MacOS-${{ matrix.arch }}.app.zip

  release:
    name: Publish Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v8
        with:
          name: windows-artifacts
          path: artifacts/

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v8
        with:
          name: linux-artifacts
          path: artifacts/

      - name: Download MacOS Intel Artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-intel-x64-artifacts
          path: artifacts/

      - name: Download MacOS Arm Artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-arm64-artifacts
          path: artifacts/

      - name: Publish Release
        uses: ./.github/actions/publish-release
        with:
          files: artifacts/*
